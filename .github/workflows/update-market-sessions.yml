name: Update market sessions

on:
  schedule:
    - cron: "7 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r market-calendar/requirements.txt

      - name: Generate market sessions
        run: python market-calendar/generate_market_sessions.py --output market-sessions.csv --days 730

      - name: Commit changed calendar
        run: |
          if git diff --quiet -- market-sessions.csv; then
            echo "market-sessions.csv is unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add market-sessions.csv
          git commit -m "Update market sessions"
          git push
